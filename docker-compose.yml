services:
  # PostgreSQL 17 데이터베이스 서비스
  postgres:
    image: postgres:17-alpine
    container_name: java_mini_project_postgres
    environment:
      POSTGRES_DB: java_test          # 생성할 데이터베이스 이름
      POSTGRES_USER: kkh              # 데이터베이스 사용자명
      POSTGRES_PASSWORD: password     # 데이터베이스 비밀번호
    ports:
      - "5431:5432"                   # 호스트:컨테이너 포트 매핑
    volumes:
      - postgres-data-auth:/var/lib/postgresql/data  # 데이터 영속성을 위한 named volume
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kkh -d java_test" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 캐시 서비스 (향후 세션/토큰 관리에 활용)
  redis:
    image: redis:alpine
    container_name: java_mini_project_redis
    ports:
      - "6379:6379"                   # 호스트:컨테이너 포트 매핑
    volumes:
      - redis-data:/data              # 데이터 영속성을 위한 named volume
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# 컨테이너 재시작 시에도 데이터가 유지되는 named volume 정의
volumes:
  postgres-data-auth:
  redis-data:
